<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Bon Pain Fait Main">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#3D2A18"/>
      <stop offset="55%" stop-color="#2D1F14"/>
      <stop offset="100%" stop-color="#160D06"/>
    </radialGradient>
    <linearGradient id="letter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4E6D1"/>
      <stop offset="55%" stop-color="#E0B888"/>
      <stop offset="100%" stop-color="#B8814F"/>
    </linearGradient>
    <filter id="lift" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="shadow"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark rounded badge -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Hairline inner frame, wax-seal feel -->
  <rect x="40" y="40" width="432" height="432" rx="76" ry="76"
        fill="none" stroke="#C9985E" stroke-opacity="0.18" stroke-width="2"/>

  <!-- Centered serif 'B' — bbox 136..376 × 100..392, optical center on canvas -->
  <g filter="url(#lift)">
    <path fill="url(#letter)" fill-rule="evenodd" d="
      M 136 100
      L 266 100
      C 326 100 360 128 360 182
      C 360 216 338 236 306 244
      C 344 252 376 276 376 322
      C 376 370 334 392 270 392
      L 136 392
      Z

      M 190 142
      L 190 216
      L 266 216
      C 298 216 312 202 312 178
      C 312 158 296 142 266 142
      Z

      M 190 272
      L 190 376
      L 270 376
      C 310 376 328 356 328 322
      C 328 294 312 272 266 272
      L 190 272
      Z"/>
  </g>
</svg>
